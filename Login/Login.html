<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Olhuz</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo-group">
      <img src="../image/logoOlhuz.png" class="logo-img">
      <div class="brand-text">
        <h1>Olhuz</h1>
        <p>A tecnologia que ilumina o invisível</p>
      </div>
    </div>

    <nav class="menu-principal">
      <a href="#">Início</a>
      <a href="#">Recursos</a>
      <a href="#">Sobre</a>
      <a href="#">Contato</a>
    </nav>
  </header>

  <hr>

  <!-- LAYOUT PRINCIPAL -->
  <main class="layout">

    <!-- LADO ESQUERDO -->
    <section class="lado-esquerdo">
      <div class="conteudo-esquerdo">
        <img src="../image/logoOlhuz.png" alt="Logo Olhuz">
        <h2>Bem-vindo ao Olhuz!</h2>
        <p class="subtitulo">A tecnologia que ilumina o invisível</p>
      </div>
    </section>

    <!-- LADO DIREITO -->
    <section class="lado-branco">
      <div class="card">
        <h3>Login</h3>
        <input type="text" placeholder="Usuário">
        <input type="password" placeholder="Senha">
        <button>Entrar</button>
      </div>
    </section>

  </main>

</body>
</html>
