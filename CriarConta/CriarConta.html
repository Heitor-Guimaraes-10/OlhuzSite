<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta - Olhuz</title>
  <link rel="stylesheet" href="criarConta.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

  <!-- HEADER (IGUAL AO LOGIN) -->
  <header>
    <div class="logo-group">
      <img src="../image/logoOlhuz.png" class="logo-img">
      <div class="brand-text">
        <h1>Olhuz</h1>
        <p>A tecnologia que ilumina o invisível</p>
      </div>
    </div>

    <nav class="menu-principal">
      <a href="../Inicial/Index.html">Início</a>
      <a href="#">Recursos</a>
      <a href="#">Sobre</a>
      <a href="#">Contato</a>
    </nav>
  </header>

  <hr>

  <!-- LAYOUT -->
  <main class="layout">

    <!-- LADO ESQUERDO (REAPROVEITADO DO LOGIN) -->
    <section class="lado-esquerdo">
      <div class="conteudo-esquerdo">
        <img src="../image/logoOlhuz.png">
        <h2>Crie sua conta<br>no<br>Olhuz</h2>
        <p class="subtitulo">Comece a iluminar o invisível</p>
      </div>
    </section>

    <!-- LADO DIREITO -->
    <section class="lado-branco">
      <div class="card cadastro">

        <h3>Criar Conta</h3>

        <form>

          <input type="text" id="nome" placeholder="Nome completo" required>
        <input type="email" id="email" placeholder="E-mail" required>


          <!-- SENHA -->
<div class="campoSenha">
  <div class="inputComOlho">
    <input type="password" id="senha" placeholder="Senha" required>
    <i class="bi bi-eye-fill olho" data-target="senha"></i>
  </div>
  <small id="forcaSenha"></small>
</div>

<!-- CONFIRMAR SENHA -->
<div class="campoSenha">
  <div class="inputComOlho">
    <input type="password" id="confirmarSenha" placeholder="Confirmar senha" required>
    <i class="bi bi-eye-fill olho" data-target="confirmarSenha"></i>
  </div>

  <small id="erroSenha"></small>

  <div class="barraForcaContainer">
    <div class="barraForca" id="barraForca"></div>
  </div>

  <small id="dicasSenha" class="dicasSenha"></small>
</div>

          <input type="text" id="cpf" placeholder="CPF" required>
<input type="text" id="endereco" placeholder="Endereço" required>


          <button type="submit" id="btnCriarConta">Criar conta</button>

        </form>

      <div class="card-interno">
          <h3>Já tem uma conta?<br> Clique aqui para entrar</h3>
        <a href="../Login/Login.html" class="btn-criar">Entrar</a>
        </div>

        </div>

      </div>
    </section>

  </main>

  <script src="CriarConta.js"></script>
</body>
</html>
